permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Resolve official site
        run: python iata_official_sites_resolver.py --airline "${{ inputs.airline }}"

      - name: Fetch baggage policy
        run: python iata_policies_fetch.py --airline "${{ inputs.airline }}"

      - name: Format and display results
        run: python format_results.py "${{ inputs.airline }}"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "data: update ${{ inputs.airline }}"
          git push
